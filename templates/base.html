<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ settings.dashboard_title }}{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/main.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/dashboard/today" aria-label="Quant Intel Brief home">
        <span class="brand-mark">QI</span>
        <span>
          <strong>Quant Intel Brief</strong>
          <small>Daily market intelligence</small>
        </span>
      </a>
      <nav class="nav" aria-label="Primary">
        <a href="/dashboard/today" {% if request.url.path == "/dashboard/today" %}class="is-active"{% endif %}>Today</a>
        <a href="/feed" {% if request.url.path == "/feed" %}class="is-active"{% endif %}>Feed</a>
        <a href="/reports" {% if request.url.path.startswith("/reports") %}class="is-active"{% endif %}>Reports</a>
        <a href="/premium" {% if request.url.path == "/premium" %}class="is-active"{% endif %}>Premium</a>
      </nav>
      <nav class="nav nav-utility" aria-label="Settings">
        <a href="/sources">Sources</a>
        <a href="/settings/llm">AI</a>
        <a href="/settings/sources">Settings</a>
      </nav>
    </header>
    {% block body %}{% endblock %}
    <script src="/static/js/main.js"></script>
  </body>
</html>
